name: Publish Python Package

on:
  release:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      pr-number: ${{ steps.pr.outputs.number }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.release.target_commitish }}
    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
    - name: Create release branch
      id: branch
      run: |
        BRANCH="release/${{ github.event.release.tag_name }}"
        echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
        git checkout -b "$BRANCH"
    - name: Update pyproject.toml version
      run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml
    - name: Create CHANGELOG.md if it doesn't exist
      run: touch CHANGELOG.md
    - name: Update CHANGELOG.md
      uses: stefanzweifel/changelog-updater-action@v1
      with:
        latest-version: ${{ github.event.release.tag_name }}
        release-notes: ${{ github.event.release.body }}
    - name: Commit and push release branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pyproject.toml CHANGELOG.md
        git commit -m "Release ${{ github.event.release.tag_name }}: update version and CHANGELOG"
        git push origin "release/${{ github.event.release.tag_name }}"
    - name: Create pull request
      id: pr
      run: |
        PR_URL=$(gh pr create \
          --title "Release ${{ github.event.release.tag_name }}" \
          --body "Automated version and changelog updates for ${{ github.event.release.tag_name }}." \
          --base "${{ github.event.release.target_commitish }}" \
          --head "release/${{ github.event.release.tag_name }}")
        echo "number=$(echo "$PR_URL" | grep -o '[0-9]*$')" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}
  test:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.prepare-release.outputs.branch }}
    - uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Run tests
      run: uv run --python ${{ matrix.python-version }} pytest
  build:
    runs-on: ubuntu-latest
    needs: [prepare-release, test]
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ needs.prepare-release.outputs.branch }}
    - uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Build
      run: uv build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-packages
        path: dist/
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    environment: release
    permissions:
      id-token: write
    steps:
    - name: Download distribution packages
      uses: actions/download-artifact@v4
      with:
        name: python-packages
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
  merge-release-pr:
    runs-on: ubuntu-latest
    needs: [prepare-release, publish]
    steps:
    - uses: actions/checkout@v6
    - name: Merge pull request
      run: gh pr merge ${{ needs.prepare-release.outputs.pr-number }} --squash --auto --delete-branch
      env:
        GH_TOKEN: ${{ github.token }}
