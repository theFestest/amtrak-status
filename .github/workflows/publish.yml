name: Publish Python Package

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.release.target_commitish }}
    - name: Extract version from tag
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
    - name: Update pyproject.toml version
      run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pyproject.toml
    - name: Create CHANGELOG.md if it doesn't exist
      run: touch CHANGELOG.md
    - name: Update CHANGELOG.md
      uses: stefanzweifel/changelog-updater-action@v1
      with:
        latest-version: ${{ github.event.release.tag_name }}
        release-notes: ${{ github.event.release.body }}
    - name: Commit updated files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        branch: ${{ github.event.release.target_commitish }}
        commit_message: "Release ${{ github.event.release.tag_name }}: update version and CHANGELOG"
        file_pattern: "pyproject.toml CHANGELOG.md"
  test:
    runs-on: ubuntu-latest
    needs: [prepare-release]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.release.target_commitish }}
    - uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Run tests
      run: uv run --python ${{ matrix.python-version }} pytest
  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.release.target_commitish }}
    - uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock
    - name: Build
      run: uv build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-packages
        path: dist/
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    environment: release
    permissions:
      id-token: write
    steps:
    - name: Download distribution packages
      uses: actions/download-artifact@v4
      with:
        name: python-packages
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
